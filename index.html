<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Modi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-canvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            border: 3px solid #2c5f2d;
            border-radius: 8px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        #jump-btn {
            margin-top: 15px;
            padding: 18px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            border: 3px solid #1B5E20;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1B5E20, 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #jump-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1B5E20, 0 4px 10px rgba(0,0,0,0.3);
        }

        #score-display {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #2c5f2d;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        #start-screen, #gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            z-index: 10;
        }

        #start-screen h1, #gameover-screen h1 {
            color: #FFD700;
            font-size: 36px;
            text-shadow: 3px 3px 0 #B8860B;
            margin-bottom: 20px;
            text-align: center;
        }

        #gameover-screen h1 {
            color: #FF4444;
            text-shadow: 3px 3px 0 #8B0000;
        }

        .screen-text {
            color: white;
            font-size: 20px;
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .screen-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(180deg, #FF6B35 0%, #D84315 100%);
            border: 3px solid #BF360C;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #BF360C, 0 7px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
        }

        .screen-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #BF360C, 0 4px 10px rgba(0,0,0,0.3);
        }

        .hidden {
            display: none !important;
        }

        #instructions {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        /* Difficulty selector */
        #difficulty-selector {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .diff-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #2c5f2d;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            color: #2c5f2d;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: #2c5f2d;
            color: white;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="533"></canvas>

        <div id="start-screen">
            <h1>Flappy Modi</h1>
            <p class="screen-text">Tap to Fly!</p>
            <p class="screen-text">Avoid the pillars!</p>
            <div id="difficulty-selector">
                <button class="diff-btn active" data-diff="easy">Easy</button>
                <button class="diff-btn" data-diff="medium">Medium</button>
                <button class="diff-btn" data-diff="hard">Hard</button>
            </div>
            <button class="screen-btn" id="start-btn">Start Game</button>
        </div>

        <div id="gameover-screen" class="hidden">
            <h1>Game Over</h1>
            <p class="screen-text" id="final-score">Score: 0</p>
            <p class="screen-text" id="best-score-display">Best: 0</p>
            <button class="screen-btn" id="restart-btn">Restart</button>
        </div>

        <button id="jump-btn">JUMP</button>
        <div id="score-display">Score: 0 | Best: 0</div>
        <p id="instructions">Tap the canvas or click Jump to fly</p>
    </div>

        // ==================== DIFFICULTY PRESETS ====================
        const DIFFICULTY = {
            easy: {
                GRAVITY: 0.35,
                JUMP_STRENGTH: -6.5,
                PIPE_SPEED: 1.8,
                PIPE_SPAWN_INTERVAL: 160,
                PIPE_GAP: 160,
                PIPE_WIDTH: 52,
                BIRD_SIZE: 44
            },
            medium: {
                GRAVITY: 0.45,
                JUMP_STRENGTH: -7.5,
                PIPE_SPEED: 2.2,
                PIPE_SPAWN_INTERVAL: 130,
                PIPE_GAP: 140,
                PIPE_WIDTH: 52,
                BIRD_SIZE: 42
            },
            hard: {
                GRAVITY: 0.55,
                JUMP_STRENGTH: -8.5,
                PIPE_SPEED: 2.8,
                PIPE_SPAWN_INTERVAL: 110,
                PIPE_GAP: 120,
                PIPE_WIDTH: 52,
                BIRD_SIZE: 40
            }
        };

        let currentDiff = 'easy';
        let config = DIFFICULTY.easy;

        // ==================== GAME CONFIGURATION ====================
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 533;
        const GROUND_HEIGHT = 50;
        const BIRD_X = 80;

        // ==================== DOM ELEMENTS ====================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const jumpBtn = document.getElementById('jump-btn');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreDisplayEl = document.getElementById('best-score-display');
        const diffButtons = document.querySelectorAll('.diff-btn');

        // ==================== GAME STATE ====================
        let gameState = 'start';
        let bird = { x: BIRD_X, y: CANVAS_HEIGHT / 2, velocity: 0, rotation: 0 };
        let pipes = [];
        let score = 0;
        let bestScore = 0;
        let frameCount = 0;
        let animationId = null;
        let clouds = [];

        // ==================== ASSETS ====================
        const modiImg = new Image();
        modiImg.src = MODI_IMAGE_BASE64;
        let modiLoaded = false;
        modiImg.onload = () => { modiLoaded = true; };
        modiImg.onerror = () => { modiLoaded = false; };

        // ==================== DIFFICULTY SELECTOR ====================
        diffButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                diffButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDiff = btn.dataset.diff;
                config = DIFFICULTY[currentDiff];
            });
        });

        // ==================== CLOUD GENERATION ====================
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * CANVAS_WIDTH,
                    y: 30 + Math.random() * 120,
                    width: 60 + Math.random() * 80,
                    speed: 0.3 + Math.random() * 0.5
                });
            }
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = CANVAS_WIDTH + Math.random() * 50;
                    cloud.y = 30 + Math.random() * 120;
                }
            });
        }

        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            clouds.forEach(cloud => {
                const r = cloud.width / 3;
                ctx.beginPath();
                ctx.arc(cloud.x + r, cloud.y + r, r, 0, Math.PI * 2);
                ctx.arc(cloud.x + r * 2, cloud.y + r * 0.7, r * 0.9, 0, Math.PI * 2);
                ctx.arc(cloud.x + r * 3, cloud.y + r, r, 0, Math.PI * 2);
                ctx.arc(cloud.x + r * 1.5, cloud.y, r * 0.8, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // ==================== PIPE MANAGEMENT ====================
        function spawnPipe() {
            const minGapY = 80;
            const maxGapY = CANVAS_HEIGHT - GROUND_HEIGHT - config.PIPE_GAP - 80;
            const gapY = minGapY + Math.random() * (maxGapY - minGapY);

            pipes.push({
                x: CANVAS_WIDTH,
                gapY: gapY,
                gapHeight: config.PIPE_GAP,
                width: config.PIPE_WIDTH,
                passed: false
            });
        }

        function updatePipes() {
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= config.PIPE_SPEED;

                if (!pipes[i].passed && pipes[i].x + pipes[i].width < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    updateScoreDisplay();
                }

                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }

            if (frameCount % config.PIPE_SPAWN_INTERVAL === 0) {
                spawnPipe();
            }
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                const topPipeHeight = pipe.gapY;
                const bottomPipeY = pipe.gapY + pipe.gapHeight;
                const bottomPipeHeight = CANVAS_HEIGHT - GROUND_HEIGHT - bottomPipeY;

                // Top pipe
                ctx.fillStyle = '#2E8B57';
                ctx.fillRect(pipe.x, 0, pipe.width, topPipeHeight);
                ctx.fillStyle = '#3CB371';
                ctx.fillRect(pipe.x - 2, topPipeHeight - 20, pipe.width + 4, 20);
                ctx.strokeStyle = '#1B5E20';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, pipe.width, topPipeHeight);
                ctx.strokeRect(pipe.x - 2, topPipeHeight - 20, pipe.width + 4, 20);

                // Bottom pipe
                ctx.fillStyle = '#2E8B57';
                ctx.fillRect(pipe.x, bottomPipeY, pipe.width, bottomPipeHeight);
                ctx.fillStyle = '#3CB371';
                ctx.fillRect(pipe.x - 2, bottomPipeY, pipe.width + 4, 20);
                ctx.strokeStyle = '#1B5E20';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, bottomPipeY, pipe.width, bottomPipeHeight);
                ctx.strokeRect(pipe.x - 2, bottomPipeY, pipe.width + 4, 20);

                // Texture lines
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                for (let j = 10; j < topPipeHeight; j += 15) {
                    ctx.beginPath();
                    ctx.moveTo(pipe.x + 5, j);
                    ctx.lineTo(pipe.x + pipe.width - 5, j);
                    ctx.stroke();
                }
                for (let j = bottomPipeY + 20; j < CANVAS_HEIGHT - GROUND_HEIGHT; j += 15) {
                    ctx.beginPath();
                    ctx.moveTo(pipe.x + 5, j);
                    ctx.lineTo(pipe.x + pipe.width - 5, j);
                    ctx.stroke();
                }
            });
        }

        // ==================== BIRD (MODI) MANAGEMENT ====================
        function updateBird() {
            bird.velocity += config.GRAVITY;
            bird.y += bird.velocity;

            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);

            if (bird.y + config.BIRD_SIZE / 2 >= CANVAS_HEIGHT - GROUND_HEIGHT) {
                bird.y = CANVAS_HEIGHT - GROUND_HEIGHT - config.BIRD_SIZE / 2;
                gameOver();
            }

            if (bird.y - config.BIRD_SIZE / 2 <= 0) {
                bird.y = config.BIRD_SIZE / 2;
                bird.velocity = 0;
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI / 180);

            if (modiLoaded) {
                ctx.drawImage(modiImg, -config.BIRD_SIZE / 2, -config.BIRD_SIZE / 2, config.BIRD_SIZE, config.BIRD_SIZE);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, config.BIRD_SIZE / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#FF9800';
                ctx.fill();
                ctx.strokeStyle = '#E65100';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('M', 0, 0);
            }

            ctx.restore();
        }

        function jump() {
            if (gameState === 'playing') {
                bird.velocity = config.JUMP_STRENGTH;
            }
        }

        // ==================== COLLISION DETECTION ====================
        function checkCollisions() {
            const margin = 6;
            const birdLeft = bird.x - config.BIRD_SIZE / 2 + margin;
            const birdRight = bird.x + config.BIRD_SIZE / 2 - margin;
            const birdTop = bird.y - config.BIRD_SIZE / 2 + margin;
            const birdBottom = bird.y + config.BIRD_SIZE / 2 - margin;

            for (let pipe of pipes) {
                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + pipe.width;

                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    if (birdTop < pipe.gapY) {
                        gameOver();
                        return;
                    }
                    if (birdBottom > pipe.gapY + pipe.gapHeight) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        // ==================== GROUND DRAWING ====================
        function drawGround() {
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, GROUND_HEIGHT);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, 12);
            ctx.strokeStyle = '#CD853F';
            ctx.lineWidth = 1;
            for (let i = 0; i < CANVAS_WIDTH; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, CANVAS_HEIGHT - GROUND_HEIGHT + 15);
                ctx.lineTo(i + 10, CANVAS_HEIGHT - GROUND_HEIGHT + 15);
                ctx.stroke();
            }
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, CANVAS_HEIGHT - GROUND_HEIGHT);
            ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_HEIGHT);
            ctx.stroke();
        }

        // ==================== SCORE MANAGEMENT ====================
        function loadBestScore() {
            const saved = localStorage.getItem('flappyModiBestScore');
            if (saved !== null) {
                bestScore = parseInt(saved, 10);
            }
            updateScoreDisplay();
        }

        function saveBestScore() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyModiBestScore', bestScore.toString());
            }
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score} | Best: ${bestScore}`;
        }

        // ==================== GAME STATE MANAGEMENT ====================
        function startGame() {
            gameState = 'playing';
            bird.y = CANVAS_HEIGHT / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            score = 0;
            frameCount = 0;

            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            updateScoreDisplay();

            bird.velocity = config.JUMP_STRENGTH;

            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();
        }

        function gameOver() {
            gameState = 'gameover';
            saveBestScore();

            finalScoreEl.textContent = `Score: ${score}`;
            bestScoreDisplayEl.textContent = `Best: ${bestScore}`;
            gameoverScreen.classList.remove('hidden');
            updateScoreDisplay();
        }

        function restartGame() {
            startGame();
        }

        // ==================== MAIN GAME LOOP ====================
        function gameLoop() {
            if (gameState !== 'playing') return;

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E0F6FF');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            updateClouds();
            drawClouds();

            updateBird();
            updatePipes();
            checkCollisions();

            drawPipes();
            drawGround();
            drawBird();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(score.toString(), CANVAS_WIDTH / 2, 60);
            ctx.fillText(score.toString(), CANVAS_WIDTH / 2, 60);

            frameCount++;
            animationId = requestAnimationFrame(gameLoop);
        }

        // ==================== EVENT LISTENERS ====================
        jumpBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (gameState === 'playing') jump();
        });

        canvas.addEventListener('click', (e) => {
            if (gameState === 'playing') jump();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') jump();
        }, { passive: false });

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') jump();
        }, { passive: false });

        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            startGame();
        });

        restartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            restartGame();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState === 'playing') jump();
                else if (gameState === 'start') startGame();
                else if (gameState === 'gameover') restartGame();
            }
        });

        // ==================== INITIALIZATION ====================
        initClouds();
        loadBestScore();

        function drawInitialBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E0F6FF');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawClouds();
            drawGround();
        }

        drawInitialBackground();
    </script>
</body>
</html>
